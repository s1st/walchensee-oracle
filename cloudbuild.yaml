steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-f', '${_DOCKERFILE}', '-t', '${_IMAGE}', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_IMAGE}']
images: ['${_IMAGE}']
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _DOCKERFILE: Dockerfile
  _IMAGE: europe-west3-docker.pkg.dev/walchi-oracle-prod/walchi/placeholder:latest
